# /etc/nginx/sites-available/messaging
# Replace chat.yourdomain.com with your actual domain

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name chat.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/chat.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.yourdomain.com/privkey.pem;

    # Serve the built frontend at /monkeychat/
    location /monkeychat/ {
        alias /home/YOUR_USER/messaging/client/dist/;
        try_files $uri $uri/ /monkeychat/index.html;
    }

    # Proxy the management API
    location /monkeychat/api/ {
        proxy_pass http://localhost:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Socket.IO connections through Nginx
    location ~ ^/monkeychat/ws/(\d+)/socket\.io(.*) {
        proxy_pass http://127.0.0.1:$1/socket.io$2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /monkeychat to /monkeychat/
    location = /monkeychat {
        return 301 /monkeychat/;
    }
}
